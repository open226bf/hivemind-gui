<p-dialog
  [header]="'Instancier — ' + (template()?.name ?? '')"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '480px' }"
>
  @let t = template();
  @if (t) {
    <div class="form flex flex-column gap-2">
      <label>Nom du service <span class="req">*</span></label>
      <input pInputText [(ngModel)]="form.name" placeholder="orders-api" />

      <label>Description</label>
      <input pInputText [(ngModel)]="form.description" placeholder="Optionnelle" />

      <div class="preset">
        <i class="pi pi-clone"></i>
        <div>
          Pré-rempli depuis <strong>{{ t.name }}</strong> (v{{ t.version }}) : image
          <code>{{ t.spec.image }}{{ t.spec.tag ? ':' + t.spec.tag : '' }}</code
          >, {{ t.spec.replicas }} réplica(s).
        </div>
      </div>

      <label>
        Tag
        @if (isLocked('tag')) {
          <p-tag value="verrouillé" severity="warn" />
        }
      </label>
      <input pInputText [(ngModel)]="form.tag" [disabled]="isLocked('tag')" />

      <label>
        Réplicas
        @if (isLocked('replicas')) {
          <p-tag value="verrouillé" severity="warn" />
        }
      </label>
      <p-inputNumber [(ngModel)]="form.replicas" [min]="0" [disabled]="isLocked('replicas')" />

      @if (t.locked_fields.length) {
        <small class="muted">
          Champs imposés par le template :
          @for (f of t.locked_fields; track f) {
            <code>{{ f }}</code>
          }
        </small>
      }
    </div>
  }
  <ng-template #footer>
    <p-button label="Annuler" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button label="Créer le service" icon="pi pi-bolt" (onClick)="save()" [loading]="saving()" />
  </ng-template>
</p-dialog>
