<p-drawer
  [(visible)]="visible"
  position="right"
  [style]="{ width: '480px' }"
  [header]="editingId() ? 'Modifier le template' : 'Créer un template'"
>
  <div class="form">
    <label>Nom <span class="req">*</span></label>
    <input pInputText [(ngModel)]="form.name" placeholder="java-api" [disabled]="!!editingId()" />
    @if (editingId()) {
      <small class="muted">Le nom est immuable.</small>
    }

    <label>Description</label>
    <input
      pInputText
      [(ngModel)]="form.description"
      placeholder="API Java standard (Spring Boot)"
    />

    <div class="row2">
      <div>
        <label>Image <span class="req">*</span></label>
        <input pInputText [(ngModel)]="form.image" placeholder="eclipse-temurin" />
      </div>
      <div>
        <label>Tag</label>
        <input pInputText [(ngModel)]="form.tag" placeholder="21-jre" />
      </div>
    </div>

    <label>Réplicas</label>
    <p-inputNumber [(ngModel)]="form.replicas" [min]="0" />

    <h3>Ressources par défaut</h3>
    <div class="row2">
      <div>
        <label>CPU réservé <em>(cœurs)</em></label>
        <p-inputNumber [(ngModel)]="form.cpuRes" [min]="0" [maxFractionDigits]="2" [step]="0.25" />
      </div>
      <div>
        <label>CPU limite</label>
        <p-inputNumber [(ngModel)]="form.cpuLim" [min]="0" [maxFractionDigits]="2" [step]="0.25" />
      </div>
    </div>
    <div class="row2">
      <div>
        <label>Mémoire réservée</label>
        <p-inputNumber [(ngModel)]="form.memResMib" [min]="0" suffix=" MiB" />
      </div>
      <div>
        <label>Mémoire limite</label>
        <p-inputNumber [(ngModel)]="form.memLimMib" [min]="0" suffix=" MiB" />
      </div>
    </div>

    <label>Réseaux par défaut</label>
    <p-multiSelect
      [options]="networkOptions()"
      [(ngModel)]="form.networkIds"
      optionLabel="label"
      optionValue="value"
      appendTo="body"
      placeholder="Aucun"
    />

    <label>Champs verrouillés</label>
    <p-multiSelect
      [options]="lockOptions"
      [(ngModel)]="form.lockedFields"
      optionLabel="label"
      optionValue="value"
      appendTo="body"
      placeholder="Aucun (tous modifiables)"
    />
    <small class="muted"
      >Les champs verrouillés ne peuvent pas être modifiés lors de l'instanciation.</small
    >
  </div>
  <ng-template #footer>
    <p-button label="Annuler" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button
      [label]="editingId() ? 'Enregistrer' : 'Créer'"
      icon="pi pi-check"
      (onClick)="save()"
      [loading]="saving()"
    />
  </ng-template>
</p-drawer>
