<p-dialog
  header="Créer un réseau"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '460px' }"
>
  <div class="form">
    <label>Nom <span class="req">*</span></label>
    <input pInputText [(ngModel)]="form.name" placeholder="backend-net" />
    <small class="muted">Nom DNS overlay (minuscules, chiffres, tirets).</small>

    <label>Subnet</label>
    <input pInputText [(ngModel)]="form.subnet" placeholder="10.0.9.0/24" />
    <small class="muted"
      >CIDR du sous-réseau IPAM. Laisser vide pour attribution automatique par Docker.</small
    >

    <div class="toggles">
      <div class="toggle-row">
        <p-toggleswitch [(ngModel)]="form.attachable" />
        <span>Attachable</span>
        <small class="muted">Permet aux conteneurs hors Swarm de rejoindre ce réseau.</small>
      </div>
      <div class="toggle-row">
        <p-toggleswitch [(ngModel)]="form.external" />
        <span>External</span>
        <small class="muted">Réseau créé en dehors de la plateforme (ne sera pas supprimé).</small>
      </div>
    </div>
  </div>
  <ng-template #footer>
    <p-button label="Annuler" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button label="Créer" icon="pi pi-check" (onClick)="save()" [loading]="saving()" />
  </ng-template>
</p-dialog>
