<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [maximizable]="true"
  [style]="{ width: '80vw', height: '70vh' }"
  [contentStyle]="{ height: '100%', padding: '0' }"
  (onShow)="onShow()"
  (onHide)="teardown()"
>
  <ng-template #header>
    <div class="term-header flex align-items-center gap-2">
      <i class="pi pi-desktop"></i>
      <span
        >Shell — conteneur <code>{{ containerId().slice(0, 12) }}</code></span
      >
      <span class="conn" [class.on]="connected()">{{
        connected() ? '● connecté' : '○ déconnecté'
      }}</span>
    </div>
  </ng-template>
  <div #term class="term"></div>
</p-dialog>
