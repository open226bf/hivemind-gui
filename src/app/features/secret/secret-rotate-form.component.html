<p-dialog
  [header]="'Rotation — ' + (target()?.name ?? '')"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '460px' }"
>
  <div class="form">
    <label>Nouvelle valeur <span class="req">*</span></label>
    <p-password [(ngModel)]="value" [feedback]="false" [toggleMask]="true" styleClass="w-full" />
    <small class="muted"
      >Remplace la valeur actuelle. Les services rattachés seront mis à jour au prochain
      déploiement.</small
    >
  </div>
  <ng-template #footer>
    <p-button label="Annuler" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button label="Rotation" icon="pi pi-sync" (onClick)="save()" [loading]="saving()" />
  </ng-template>
</p-dialog>
