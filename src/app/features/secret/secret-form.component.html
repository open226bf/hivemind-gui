<p-dialog
  header="Créer un secret"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '460px' }"
>
  <div class="form">
    <label>Nom <span class="req">*</span></label>
    <input pInputText [(ngModel)]="form.name" placeholder="db_password" />

    <label>Chemin cible</label>
    <input pInputText [(ngModel)]="form.target_path" placeholder="/run/secrets/db_password" />

    <label>Valeur <span class="req">*</span></label>
    <p-password
      [(ngModel)]="form.value"
      [feedback]="false"
      [toggleMask]="true"
      styleClass="w-full"
    />
    <small class="muted">La valeur est chiffrée et ne sera jamais réaffichée.</small>
  </div>
  <ng-template #footer>
    <p-button label="Annuler" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button label="Créer" icon="pi pi-check" (onClick)="save()" [loading]="saving()" />
  </ng-template>
</p-dialog>
