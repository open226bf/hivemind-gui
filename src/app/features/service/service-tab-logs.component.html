<div class="logctl">
  <span class="conn" [class.on]="connected()">
    <span class="dot"></span>{{ connected() ? 'Connecté' : 'Déconnecté' }}
  </span>

  <label class="ctl">
    <span>Suivre</span>
    <p-toggleswitch [(ngModel)]="follow" (ngModelChange)="restart()" />
  </label>

  <label class="ctl">
    <span>Lignes</span>
    <input pInputText class="tail" type="number" min="1" [(ngModel)]="tail" (change)="restart()" />
  </label>

  <span class="spacer"></span>

  <label class="ctl">
    <span>Auto-défilement</span>
    <p-toggleswitch [(ngModel)]="autoScroll" />
  </label>
  <p-button
    icon="pi pi-refresh"
    label="Recharger"
    severity="secondary"
    size="small"
    [text]="true"
    (onClick)="restart()"
  />
  <p-button
    icon="pi pi-trash"
    label="Effacer"
    severity="secondary"
    size="small"
    [text]="true"
    (onClick)="clear()"
  />
</div>

@if (error(); as e) {
  <div class="banner error"><i class="pi pi-exclamation-triangle"></i> {{ e }}</div>
}

<div #console class="console" (scroll)="onScroll()">
  @if (lines().length === 0) {
    <div class="empty">{{ connected() ? 'En attente de logs…' : 'Aucun log.' }}</div>
  } @else {
    @for (line of lines(); track $index) {
      <div class="line">{{ line }}</div>
    }
  }
</div>
